name: Deploy to Cloudflare Pages

# Deploys the static site to Cloudflare Pages on every push to `prod`
# (the production branch), and a preview deployment for PRs targeting `prod`.
# Branch model:  dev (work) → main (default/integration) → prod (deploys)
on:
  push:
    branches: [prod]
  pull_request:
    branches: [prod]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write
  pull-requests: write   # lets Wrangler post the preview URL on PRs

concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This is a plain static site — no build step needed.
      # If you add a build tool later (e.g. Vite/Tailwind), run it here
      # and point `directory:` below at the build output folder.

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `.` = repo root (where index.html lives). Change if you add a build dir.
          command: pages deploy . --project-name=tradewise --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true
